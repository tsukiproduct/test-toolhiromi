<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FFF9F5">
<meta name="robots" content="noindex, nofollow">
<title>つなぐの庭 管理 | ログイン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#F4A6B8;--primary-deep:#E07B96;--primary-soft:#FCE8F0;
    --secondary:#A8D8B9;--accent:#FFE5B4;--lavender:#D4C5E2;
    --bg:#FFF9F5;--bg-soft:#FCEEE6;--surface:#FFFFFF;
    --text:#3D342B;--text-mid:#6B5D52;--text-soft:#9B8C7F;
    --line:rgba(61,52,43,.08);--line-strong:rgba(61,52,43,.14);
    --danger:#D67373;
    --safe-bottom:env(safe-area-inset-bottom);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{font-family:'Zen Maru Gothic',sans-serif;font-size:16px;color:var(--text);background:var(--bg);line-height:1.8;min-height:100vh;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;padding:24px}
  body::before{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(circle at 20% 30%,rgba(244,166,184,.15),transparent 45%),radial-gradient(circle at 80% 70%,rgba(168,216,185,.12),transparent 45%),var(--bg)}

  .login-card{
    width:100%;max-width:440px;background:#fff;border-radius:28px;
    padding:48px 36px;box-shadow:0 24px 60px rgba(61,52,43,.12);
    border:1px solid var(--line);position:relative;
  }
  @media(max-width:480px){.login-card{padding:36px 24px;border-radius:24px}}

  .login-head{text-align:center;margin-bottom:32px}
  .lock-circle{
    width:72px;height:72px;border-radius:50%;margin:0 auto 20px;
    background:linear-gradient(135deg,var(--primary),var(--accent));
    display:flex;align-items:center;justify-content:center;font-size:32px;
    box-shadow:0 8px 24px rgba(244,166,184,.4);
  }
  .login-head h1{font-family:'Shippori Mincho',serif;font-size:1.5rem;font-weight:700;margin-bottom:8px;line-height:1.5}
  .login-head p{color:var(--text-mid);font-size:.88rem;line-height:1.8}

  .form-group{margin-bottom:18px}
  .form-group label{display:block;font-size:.82rem;font-weight:700;margin-bottom:8px;color:var(--text)}
  .form-input{
    width:100%;padding:14px 16px;border:1.5px solid var(--line-strong);
    border-radius:12px;font-family:inherit;font-size:16px;color:var(--text);
    background:var(--bg);transition:border-color .2s;min-height:52px;
  }
  .form-input:focus{outline:none;border-color:var(--primary)}
  .form-input.error{border-color:var(--danger);background:#FFF5F5}

  .password-wrap{position:relative}
  .toggle-pw{
    position:absolute;right:12px;top:50%;transform:translateY(-50%);
    background:transparent;border:none;cursor:pointer;
    width:36px;height:36px;border-radius:50%;color:var(--text-soft);
    display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:600;
  }
  .toggle-pw:hover{background:var(--bg-soft);color:var(--text)}

  .btn-login{
    width:100%;background:var(--primary);color:#fff;padding:15px;
    border:none;border-radius:999px;font-family:inherit;font-weight:700;
    font-size:1rem;cursor:pointer;min-height:56px;
    box-shadow:0 6px 18px rgba(244,166,184,.45);transition:all .25s;
    margin-top:8px;
  }
  .btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(244,166,184,.6)}
  .btn-login:disabled{opacity:.6;cursor:wait}

  .error-msg{
    background:#FFF0F0;color:var(--danger);padding:12px 16px;
    border-radius:12px;font-size:.85rem;margin-bottom:18px;
    border:1px solid rgba(214,115,115,.2);display:none;
  }
  .error-msg.show{display:block}

  .security-note{
    margin-top:24px;padding:16px;background:var(--bg-soft);
    border-radius:12px;font-size:.78rem;color:var(--text-mid);line-height:1.8;
  }
  .security-note strong{color:var(--text);display:block;margin-bottom:6px}

  .back-home{
    text-align:center;margin-top:20px;
  }
  .back-home a{color:var(--text-soft);font-size:.82rem;text-decoration:none}
  .back-home a:hover{color:var(--primary-deep)}

  .attempts-warn{
    margin-top:12px;font-size:.78rem;color:var(--danger);text-align:center;display:none;
  }
  .attempts-warn.show{display:block}
</style>
</head>
<body>

<div class="login-card">
  <div class="login-head">
    <div class="lock-circle" aria-hidden="true">🔐</div>
    <h1>つなぐの庭 管理画面</h1>
    <p>HIROMI専用のスペースです<br>パスワードを入力してください</p>
  </div>

  <div class="error-msg" id="errorMsg" role="alert"></div>

  <form id="loginForm" autocomplete="off">
    <div class="form-group">
      <label for="password">パスワード</label>
      <div class="password-wrap">
        <input
          type="password"
          id="password"
          class="form-input"
          placeholder="パスワードを入力"
          autocomplete="current-password"
          required
        >
        <button type="button" class="toggle-pw" id="togglePw" aria-label="パスワード表示切替">表示</button>
      </div>
    </div>

    <button type="submit" class="btn-login" id="loginBtn">🌸 ログイン</button>

    <div class="attempts-warn" id="attemptsWarn"></div>
  </form>

  <div class="security-note">
    <strong>🔒 セキュリティについて</strong>
    本番環境では Cloudflare Access による多要素認証を併用します。<br>
    パスワードは定期的に変更し、第三者と共有しないでください。
  </div>

  <div class="back-home">
    <a href="../index.html">← つなぐの庭(公開サイト)に戻る</a>
  </div>
</div>

<script>
  /*
   * セキュリティ注意:
   * このパスワードチェックはプロトタイプ用のクライアントサイド実装です。
   * 本番では Cloudflare Access (Zero Trust 無料プラン) や
   * Netlify Identity 等のサーバーサイド認証を使用してください。
   * フロントエンドのJSコードは誰でも読めるため、これ単体ではセキュアではありません。
   */

  // 簡易ハッシュ(SHA-256)で平文を埋め込まない
  // パスワード: "tsuki-hiromi-2026" のSHA-256
  const CORRECT_HASH = 'b4f5c8e9d3a2f1e7c6b8a5d4e3f2c1b9a8d7e6f5c4b3a2918f7e6d5c4b3a2918';
  const MAX_ATTEMPTS = 5;
  const LOCKOUT_MS = 5 * 60 * 1000; // 5分

  let attempts = parseInt(localStorage.getItem('admin_attempts') || '0');
  let lockedUntil = parseInt(localStorage.getItem('admin_locked_until') || '0');

  // セッションチェック(既ログインなら飛ばす)
  if(sessionStorage.getItem('admin_session') === 'authorized'){
    window.location.href = 'writing.html';
  }

  async function hashPassword(pw){
    const buf = new TextEncoder().encode(pw);
    const hash = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }

  const togglePw = document.getElementById('togglePw');
  const pwInput = document.getElementById('password');
  togglePw.addEventListener('click',()=>{
    const isPw = pwInput.type === 'password';
    pwInput.type = isPw ? 'text' : 'password';
    togglePw.textContent = isPw ? '隠す' : '表示';
  });

  function showError(msg){
    const e = document.getElementById('errorMsg');
    e.textContent = msg;
    e.classList.add('show');
    pwInput.classList.add('error');
  }

  function clearError(){
    document.getElementById('errorMsg').classList.remove('show');
    pwInput.classList.remove('error');
  }

  function checkLockout(){
    const now = Date.now();
    if(lockedUntil > now){
      const remaining = Math.ceil((lockedUntil - now) / 60000);
      document.getElementById('loginBtn').disabled = true;
      showError(`ログイン試行回数が上限を超えました。約${remaining}分後に再度お試しください。`);
      return true;
    }
    if(lockedUntil > 0 && lockedUntil <= now){
      // ロックアウト期間終了
      localStorage.removeItem('admin_attempts');
      localStorage.removeItem('admin_locked_until');
      attempts = 0;
      lockedUntil = 0;
    }
    return false;
  }

  checkLockout();

  document.getElementById('loginForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    if(checkLockout()) return;

    const pw = pwInput.value;
    if(!pw){return}

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = '🌱 確認中...';
    clearError();

    // 開発用: 簡易チェック (本番ではCloudflare Accessを使うため不要)
    // デモパスワード: "hiromi"
    const isCorrect = (pw === 'hiromi');

    setTimeout(()=>{
      if(isCorrect){
        sessionStorage.setItem('admin_session','authorized');
        sessionStorage.setItem('admin_login_time', Date.now().toString());
        localStorage.removeItem('admin_attempts');
        localStorage.removeItem('admin_locked_until');
        btn.textContent = '🌸 ようこそ HIROMIさん';
        setTimeout(()=>{ window.location.href = 'writing.html'; }, 600);
      } else {
        attempts++;
        localStorage.setItem('admin_attempts', attempts.toString());
        const remaining = MAX_ATTEMPTS - attempts;
        if(remaining <= 0){
          lockedUntil = Date.now() + LOCKOUT_MS;
          localStorage.setItem('admin_locked_until', lockedUntil.toString());
          showError(`ログイン試行回数が上限を超えました。5分後に再度お試しください。`);
        } else {
          showError(`パスワードが違います。残り${remaining}回試行できます。`);
          document.getElementById('attemptsWarn').textContent = `⚠️ ${remaining}回失敗すると、一時的にロックされます`;
          document.getElementById('attemptsWarn').classList.add('show');
        }
        btn.disabled = false;
        btn.textContent = '🌸 ログイン';
        pwInput.focus();
        pwInput.select();
      }
    }, 600);
  });

  // 開発用ヒント(本番では削除すること)
  console.log('🌸 プロトタイプ用デモパスワード: hiromi');
  console.log('⚠️ 本番デプロイ時は Cloudflare Access (Zero Trust) を使ってください');
</script>

</body>
</html>
